<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>전술 기동: 로그 강제 출력 버전</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; background: #f0f0f0; overflow: hidden; }
        #login-screen { position: fixed; inset: 0; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        #main-game { display: none; flex: 1; padding: 10px; gap: 15px; overflow-y: auto; }
        .left-panel { flex: 2; display: flex; flex-direction: column; gap: 5px; }
        .right-panel { flex: 1; display: flex; flex-direction: column; gap: 10px; min-width: 250px; }
        .grid { width: 100%; height: 210px; background: #34495e; border: 2px solid #333; display: grid; grid-template-columns: repeat(20, 1fr); grid-template-rows: repeat(10, 1fr); }
        .grid div { border: 0.1px solid #555; cursor: pointer; box-sizing: border-box; }
        .my-unit { background: #2ecc71 !important; border: 1px solid #27ae60 !important; }
        .hit-unit { background: #e74c3c !important; border: 1px solid #c0392b !important; }
        .miss-cell { background: #95a5a6 !important; }
        .ghost { background: rgba(46, 204, 113, 0.4); pointer-events: none; }
        .ghost-invalid { background: rgba(231, 76, 60, 0.4); }
        .inventory { display: flex; gap: 5px; flex-wrap: wrap; background: #ddd; padding: 8px; border-radius: 5px; margin-bottom: 5px; min-height: 45px; }
        .unit-btn { padding: 6px 10px; border: 1px solid #333; cursor: pointer; background: white; font-weight: bold; font-size: 0.85em; }
        .unit-btn.active { background: #3498db; color: white; border-color: #2980b9; }
        .ctrl-group { display: flex; gap: 8px; justify-content: center; margin-bottom: 5px; }
        button { cursor: pointer; border-radius: 4px; border: 1px solid #999; font-weight: bold; }
        #start-btn { background: #4CAF50; color: white; border: none; font-size: 1.1em; padding: 10px 20px; transition: 0.3s; }
        .log-area, .chat-area { flex: 1; background: white; border: 1px solid #ccc; overflow-y: auto; padding: 10px; font-size: 0.85em; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1>전술 기동 [로그 강제 출력]</h1>
        <div style="margin-bottom: 10px; display: flex; flex-direction: column; gap: 5px;">
            <input type="text" id="name-input" placeholder="이름 입력" value="테스터">
            <input type="number" id="room-input" placeholder="방 번호" value="1">
        </div>
        <button onclick="joinGame()" style="padding: 12px 30px; background:#2ecc71; color:white; border:none; font-size: 1.1em;">입장하기</button>
    </div>

    <div id="main-game">
        <div class="left-panel">
            <div class="name-label">상대: <span id="opp-name">대기 중</span></div>
            <div id="opponent-grid" class="grid"></div>
            <div id="unit-inventory" class="inventory"></div>
            <div class="ctrl-group">
                <button onclick="rotateUnit()">회전 🔄</button>
                <button id="start-btn" onclick="handleButtonClick()">준비하기</button>
                <button onclick="resetPlacement()">초기화 🧹</button>
            </div>
            <div id="my-grid" class="grid" onmouseleave="clearGhost()"></div>
        </div>
        <div class="right-panel">
            <strong>📊 게임 로그 (여기 글자 뜨는지 확인!)</strong>
            <div id="game-log" class="log-area"></div>
            <strong>💬 채팅</strong>
            <div id="chat-log" class="chat-area"></div>
            <div style="display:flex; gap:5px;">
                <input type="text" id="chat-input" style="flex:1;" onkeypress="if(event.keyCode==13) sendChat()">
                <button onclick="sendChat()">전송</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myUnits = [], selectedUnitType = null, currentRotation = 0, gameStatus = "LOBBY";

        const UNIT_DATA = {
            'ㄷ': [[1,1,0], [1,0,0], [1,1,0]],
            'L': [[1,0,0], [1,0,0], [1,1,0]],
            'T': [[1,1,1], [0,1,0], [0,0,0]],
            'ㅗ': [[0,1,0], [1,1,1], [0,0,0]],
            '1x1': [[1]],
            '1x2': [[1,1]]
        };
        let inventory = { 'ㄷ':1, 'L':1, 'T':1, 'ㅗ':1, '1x1':1, '1x2':1 };

        function joinGame() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-game').style.display = 'flex';
            socket.emit('joinRoom', { roomCode: document.getElementById('room-input').value, name: document.getElementById('name-input').value });
            initGrids(); renderInventory();
            addGameLog("게임 접속됨. 로그 작동 시작.");
        }

        function initGrids() {
            const myG = document.getElementById('my-grid');
            myG.innerHTML = '';
            for(let i=0; i<200; i++) {
                const m = document.createElement('div');
                m.onmouseenter = () => showGhost(i);
                m.onclick = () => {
                    console.log("격자 클릭됨:", i); // 브라우저 콘솔
                    placeOrPickUnit(i);
                };
                myG.appendChild(m);
            }
        }

        function rotateUnit() {
            currentRotation = (currentRotation + 90) % 360;
            addGameLog("[회전] " + currentRotation + "도");
        }

        function getRotatedCells(type, pivotIdx, rotation) {
            const matrix = UNIT_DATA[type];
            if(!matrix) return [];

            let rotated = matrix;
            const times = (rotation / 90) % 4;
            for(let t=0; t<times; t++) {
                const r = rotated.length, c = rotated[0].length;
                let newMat = Array.from({ length: c }, () => Array(r).fill(0));
                for(let i=0; i<r; i++) { for(let j=0; j<c; j++) { newMat[j][r-1-i] = rotated[i][j]; } }
                rotated = newMat;
            }

            const rCount = rotated.length, cCount = rotated[0].length;
            const px = pivotIdx % 20, py = Math.floor(pivotIdx / 20);
            const midR = Math.floor(rCount / 2), midC = Math.floor(cCount / 2);
            
            let cells = [];
            for(let r=0; r<rCount; r++) {
                for(let c=0; c<cCount; c++) {
                    if(rotated[r][c] === 1) {
                        let fx = px + (c - midC), fy = py + (r - midR);
                        if(fx < 0 || fx >= 20 || fy < 0 || fy >= 10) cells.push(-1);
                        else cells.push(fy * 20 + fx);
                    }
                }
            }
            return cells;
        }

        function placeOrPickUnit(idx) {
            // [로그 폭탄 1] 클릭하자마자 바로 찍기
            addGameLog(`[클릭] ${idx}번 칸 (선택: ${selectedUnitType || '없음'})`);

            // [Pick] 유닛 회수
            const uIdx = myUnits.findIndex(u => u.cells.includes(idx));
            if (uIdx !== -1) {
                const u = myUnits[uIdx];
                myUnits.splice(uIdx, 1); inventory[u.type]++;
                selectedUnitType = u.type; renderInventory(); renderMyGrid();
                addGameLog(`[회수] ${u.type} 블록`);
                return;
            }

            if(!selectedUnitType) return addGameLog("[알림] 블록을 먼저 선택하세요.");
            if(inventory[selectedUnitType] <= 0) return addGameLog("[알림] 재고가 없습니다.");

            const cells = getRotatedCells(selectedUnitType, idx, currentRotation);
            
            // [로그 폭탄 2] 계산 결과 찍기
            addGameLog(`[계산] 좌표: ${JSON.stringify(cells)}`);

            if(cells.includes(-1)) return addGameLog("[실패] 격자 밖으로 나감!");
            if(cells.some(c => myUnits.some(u => u.cells.includes(c)))) return addGameLog("[실패] 다른 블록과 겹침!");

            // [성공]
            myUnits.push({ type: selectedUnitType, cells: cells });
            inventory[selectedUnitType]--;
            if(inventory[selectedUnitType] <= 0) selectedUnitType = null;
            renderInventory(); renderMyGrid();
            addGameLog(`[성공] ${selectedUnitType} 배치됨!`);
        }

        function renderMyGrid() {
            const cells = document.getElementById('my-grid').children;
            for(let i=0; i<200; i++) cells[i].className = '';
            myUnits.forEach(u => u.cells.forEach(c => cells[c].classList.add('my-unit')));
        }

        function showGhost(idx) {
            clearGhost(); if(!selectedUnitType) return;
            const cells = getRotatedCells(selectedUnitType, idx, currentRotation);
            const myG = document.getElementById('my-grid');
            cells.forEach(c => { if(c !== -1) myG.children[c].classList.add('ghost'); });
        }

        function clearGhost() { document.querySelectorAll('.ghost').forEach(g => g.classList.remove('ghost')); }

        function renderInventory() {
            const inv = document.getElementById('unit-inventory'); inv.innerHTML = '';
            for(let t in inventory) {
                if(inventory[t] > 0) {
                    const b = document.createElement('button');
                    b.className = 'unit-btn' + (selectedUnitType === t ? ' active' : '');
                    b.innerText = `${t}(${inventory[t]})`;
                    b.onclick = () => { selectedUnitType = t; renderInventory(); };
                    inv.appendChild(b);
                }
            }
        }

        function addGameLog(m) {
            const l = document.getElementById('game-log');
            l.innerHTML += `<div>${m}</div>`;
            l.scrollTop = l.scrollHeight;
        }

        // 나머지 소켓 함수들 (채팅 등 최소화)
        function sendChat() { const i = document.getElementById('chat-input'); if(i.value) socket.emit('sendChat', i.value); i.value = ""; }
        socket.on('receiveChat', d => { document.getElementById('chat-log').innerHTML += `<div><b>${d.name}:</b> ${d.msg}</div>`; });
        socket.on('roomData', d => { /* 명단 갱신 생략 */ });
        function handleButtonClick() { socket.emit('toggleReady'); }
        function resetPlacement() { myUnits = []; for(let t in inventory) inventory[t]=1; renderInventory(); renderMyGrid(); }
    </script>
</body>
</html>
