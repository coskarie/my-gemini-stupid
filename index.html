<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>블록 찾기: 전술 기동 온라인</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; background: #f0f0f0; overflow: hidden; }
        #login-screen { position: fixed; inset: 0; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        #main-game { display: none; flex: 1; padding: 10px; gap: 15px; overflow-y: auto; }
        .left-panel { flex: 2; display: flex; flex-direction: column; gap: 5px; }
        .right-panel { flex: 1; display: flex; flex-direction: column; gap: 10px; min-width: 250px; }
        .grid { width: 100%; height: 210px; background: #34495e; border: 2px solid #333; display: grid; grid-template-columns: repeat(20, 1fr); grid-template-rows: repeat(10, 1fr); }
        .grid div { border: 0.1px solid #555; cursor: pointer; box-sizing: border-box; }
        .my-unit { background: #2ecc71 !important; border: 1px solid #27ae60 !important; }
        .hit-unit { background: #e74c3c !important; border: 1px solid #c0392b !important; }
        .miss-cell { background: #95a5a6 !important; }
        .ghost { background: rgba(46, 204, 113, 0.4); pointer-events: none; }
        .ghost-invalid { background: rgba(231, 76, 60, 0.4); }
        .inventory { display: flex; gap: 5px; flex-wrap: wrap; background: #ddd; padding: 8px; border-radius: 5px; margin-bottom: 5px; min-height: 45px; }
        .unit-btn { padding: 6px 10px; border: 1px solid #333; cursor: pointer; background: white; font-weight: bold; font-size: 0.85em; }
        .unit-btn.active { background: #3498db; color: white; border-color: #2980b9; }
        .ctrl-group { display: flex; gap: 8px; justify-content: center; margin-bottom: 5px; }
        button { cursor: pointer; border-radius: 4px; border: 1px solid #999; font-weight: bold; }
        #start-btn { background: #4CAF50; color: white; border: none; font-size: 1.1em; padding: 10px 20px; transition: 0.3s; }
        #start-btn:disabled { background: #ccc; cursor: not-allowed; }
        .log-area, .chat-area { flex: 1; background: white; border: 1px solid #ccc; overflow-y: auto; padding: 10px; font-size: 0.85em; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1>전술 기동 블록 찾기</h1>
        <div style="margin-bottom: 10px; display: flex; flex-direction: column; gap: 5px;">
            <input type="text" id="name-input" placeholder="이름 입력" style="padding: 10px; width: 200px;">
            <input type="number" id="room-input" placeholder="방 번호" style="padding: 10px; width: 200px;">
        </div>
        <button onclick="joinGame()" style="padding: 12px 30px; background:#2ecc71; color:white; border:none; font-size: 1.1em;">입장하기</button>
    </div>

    <div id="main-game">
        <div class="left-panel">
            <div class="name-label">상대: <span id="opp-name">대기 중</span> <span id="opp-v" style="color:green; display:none; font-weight:bold;">[V]</span></div>
            <div id="opponent-grid" class="grid"></div>
            <div id="unit-inventory" class="inventory"></div>
            <div class="ctrl-group">
                <button onclick="rotateUnit()" style="padding: 8px 15px; background:#f39c12; color:white; border:none;">회전 🔄</button>
                <button id="start-btn" onclick="handleButtonClick()">준비하기</button>
                <button onclick="resetPlacement()" style="padding: 8px 15px; background:#e67e22; color:white; border:none;">초기화 🧹</button>
            </div>
            <div class="name-label">나: <span id="my-name-display">-</span> <span id="my-v" style="color:green; display:none; font-weight:bold;">[V]</span></div>
            <div id="my-grid" class="grid" onmouseleave="clearGhost()"></div>
        </div>
        <div class="right-panel">
            <strong>📊 게임 로그</strong>
            <div id="game-log" class="log-area"></div>
            <strong>💬 실시간 채팅</strong>
            <div id="chat-log" class="chat-area"></div>
            <div style="display:flex; gap:5px;">
                <input type="text" id="chat-input" style="flex:1; padding: 5px;" onkeypress="if(event.keyCode==13) sendChat()">
                <button onclick="sendChat()" style="padding: 5px 15px;">전송</button>
            </div>
            <div style="background: #eee; padding: 10px; border-radius: 5px; font-size: 0.9em;">
                <div id="player-list">플레이어: </div>
                <div id="spectator-list">관전자: </div>
                <div style="display:flex; gap:5px; margin-top:5px;">
                    <button onclick="changeRole('player')" style="flex:1; padding:5px;">플레이어로</button>
                    <button onclick="changeRole('spectator')" style="flex:1; padding:5px;">관전자로</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myName = "", myRoom = "", myUnits = [], isMyTurn = false;
        let gameStatus = "LOBBY", selectedUnitType = null, currentRotation = 0;

        // [수정] 자음/모음 코드 불일치 방지를 위해 키를 명확히 정의
        const UNIT_SHAPES = {
            'ㄷ': [[0,0], [1,0], [0,1], [0,2], [1,2]],
            'L': [[0,0], [0,1], [0,2], [1,2]],
            'T': [[0,0], [1,0], [2,0], [1,1]],
            'ㅗ': [[1,0], [0,1], [1,1], [2,1]],
            'I': [[0,0], [0,1], [0,2], [0,3]],
            '1x1': [[0,0]],
            '1x2': [[0,0], [0,1]]
        };
        let inventory = { 'ㄷ':1, 'L':1, 'T':1, 'ㅗ':1, 'I':1, '1x1':1, '1x2':1 };

        function joinGame() {
            myName = document.getElementById('name-input').value;
            myRoom = document.getElementById('room-input').value;
            if(!myName || !myRoom) return alert("입력 부족!");
            document.getElementById('my-name-display').innerText = myName;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-game').style.display = 'flex';
            socket.emit('joinRoom', { roomCode: myRoom, name: myName });
            initGrids(); renderInventory();
        }

        function initGrids() {
            const oppG = document.getElementById('opponent-grid'), myG = document.getElementById('my-grid');
            oppG.innerHTML = ''; myG.innerHTML = '';
            for(let i=0; i<200; i++) {
                const o = document.createElement('div');
                o.onclick = () => { if(gameStatus === 'PLAYING' && isMyTurn) socket.emit('attack', i); };
                oppG.appendChild(o);
                const m = document.createElement('div');
                m.onmouseenter = () => showGhost(i);
                m.onclick = () => placeOrPickUnit(i);
                myG.appendChild(m);
            }
        }

        function rotateUnit() {
            currentRotation = (currentRotation + 90) % 360;
            addGameLog("[알림] 회전: " + currentRotation + "도");
        }

        function getRotatedCells(type, pivotIdx, rotation) {
            const shape = UNIT_SHAPES[type];
            if (!shape) return []; // 예외 처리 추가

            let px = pivotIdx % 20, py = Math.floor(pivotIdx / 20);
            let rotated = shape.map(([dx, dy]) => {
                let rx = dx, ry = dy;
                for(let r=0; r < rotation/90; r++) { let tx = -ry; let ty = rx; rx = tx; ry = ty; }
                return [rx, ry];
            });

            // 기준점 보정: 회전된 블록의 가장 왼쪽 상단을 클릭 지점으로 맞춤
            let minX = Math.min(...rotated.map(o => o[0])), minY = Math.min(...rotated.map(o => o[1]));
            return rotated.map(([rx, ry]) => {
                let fx = px + (rx - minX), fy = py + (ry - minY);
                if(fx < 0 || fx >= 20 || fy < 0 || fy >= 10) return -1;
                return fy * 20 + fx;
            });
        }

        function placeOrPickUnit(idx) {
            if(gameStatus !== 'PLACING' && gameStatus !== 'MOVING') return;
            const uIdx = myUnits.findIndex(u => u.cells.includes(idx));
            
            // 유닛 수거 로직
            if (uIdx !== -1) {
                const u = myUnits[uIdx];
                if (u.isHit) return alert("피격된 유닛 고정!");
                myUnits.splice(uIdx, 1); inventory[u.type]++;
                selectedUnitType = u.type; 
                addGameLog("[알림] " + u.type + " 유닛 수거됨.");
                renderInventory(); renderMyGrid();
                return;
            }

            // 유닛 배치 로직
            if(!selectedUnitType) return addGameLog("[오류] 먼저 배치할 유닛을 선택하세요.");
            if(inventory[selectedUnitType] <= 0) return addGameLog("[오류] 재고가 없습니다.");

            const cells = getRotatedCells(selectedUnitType, idx, currentRotation);
            
            if(cells.includes(-1)) {
                return addGameLog("[오류] 격자 범위를 벗어납니다.");
            }
            if(cells.some(c => myUnits.some(u => u.cells.includes(c)))) {
                return addGameLog("[오류] 다른 유닛과 겹칩니다.");
            }

            myUnits.push({ type: selectedUnitType, cells: cells, isHit: false });
            inventory[selectedUnitType]--;
            addGameLog("[성공] " + selectedUnitType + " 유닛 배치 완료.");
            
            if(inventory[selectedUnitType] <= 0) selectedUnitType = null;
            renderInventory(); renderMyGrid();
        }

        function renderMyGrid() {
            const cells = document.getElementById('my-grid').children;
            for(let i=0; i<200; i++) { cells[i].className = ''; cells[i].style.opacity = "1"; }
            myUnits.forEach(u => { u.cells.forEach(c => {
                cells[c].classList.add('my-unit');
                if (u.isHit) cells[c].style.opacity = "0.6";
                if (u.hitCells && u.hitCells.includes(c)) cells[c].classList.add('hit-unit');
            });});
        }

        function showGhost(idx) {
            clearGhost(); if(!selectedUnitType) return;
            const cells = getRotatedCells(selectedUnitType, idx, currentRotation);
            const myG = document.getElementById('my-grid');
            const inv = cells.includes(-1) || cells.some(c => myUnits.some(u => u.cells.includes(c)));
            cells.forEach(c => { if(c !== -1) myG.children[c].classList.add('ghost', inv ? 'ghost-invalid' : 'null'); });
        }

        function clearGhost() { document.querySelectorAll('.ghost').forEach(g => g.classList.remove('ghost', 'ghost-invalid')); }

        function renderInventory() {
            const inv = document.getElementById('unit-inventory'); inv.innerHTML = '';
            for(let t in inventory) { if(inventory[t] > 0) {
                const b = document.createElement('button');
                b.className = 'unit-btn' + (selectedUnitType === t ? ' active' : '');
                b.innerText = `${t}(${inventory[t]})`;
                b.onclick = () => { selectedUnitType = t; renderInventory(); };
                inv.appendChild(b);
            }}
        }

        function handleButtonClick() {
            const btn = document.getElementById('start-btn'), txt = btn.innerText;
            if (txt === "게임 시작하기!") socket.emit('startGame');
            else if (txt === "준비하기" || txt === "준비 취소") socket.emit('toggleReady');
            else if (gameStatus === "PLACING" || gameStatus === "MOVING") {
                if (Object.values(inventory).some(v => v > 0)) return alert("모든 유닛 배치 필수!");
                btn.disabled = true; btn.innerText = "대기 중...";
                socket.emit('finishPlacing', myUnits);
            } else if (gameStatus === "ENDED") socket.emit('requestRematch');
        }

        socket.on('roomData', data => {
            const me = data.players.find(p => p.id === socket.id), opp = data.players.find(p => p.id !== socket.id);
            gameStatus = data.gameState;
            document.getElementById('my-v').style.display = (me && me.isReady) ? 'inline' : 'none';
            if (opp) { document.getElementById('opp-name').innerText = opp.name; document.getElementById('opp-v').style.display = opp.isReady ? 'inline' : 'none'; }
            if (data.gameState === 'LOBBY') {
                const btn = document.getElementById('start-btn'); btn.disabled = false;
                if (data.players.length === 2 && data.players.every(p => p.isReady)) { btn.innerText = "게임 시작하기!"; btn.style.background = "#FF9800"; }
                else { btn.innerText = (me && me.isReady) ? "준비 취소" : "준비하기"; btn.style.background = "#4CAF50"; }
            }
            document.getElementById('player-list').innerText = "플레이어: " + data.players.map(p => p.name).join(', ');
            document.getElementById('spectator-list').innerText = "관전자: " + data.spectators.map(s => s.name).join(', ');
        });

        socket.on('startPlacing', () => { gameStatus = "PLACING"; const b = document.getElementById('start-btn'); b.innerText = "배치 확정"; b.style.background = "#2ecc71"; b.disabled = false; });
        socket.on('startMoving', () => { gameStatus = "MOVING"; const b = document.getElementById('start-btn'); b.innerText = "기동 확정"; b.style.background = "#9b59b6"; b.disabled = false; });
        socket.on('gameStart', d => { gameStatus = "PLAYING"; updateTurn(d.turn); });
        socket.on('attackResult', d => {
            const g = (d.attacker === socket.id) ? document.getElementById('opponent-grid') : document.getElementById('my-grid');
            g.children[d.index].classList.add(d.hit ? 'hit-unit' : 'miss-cell');
            if(!d.hit) updateTurn(d.nextTurn);
        });

        function updateTurn(turnId) {
            isMyTurn = (socket.id === turnId);
            const b = document.getElementById('start-btn');
            b.innerText = isMyTurn ? "🔥 나의 턴" : "⏳ 상대 턴";
            b.style.background = isMyTurn ? "#e74c3c" : "#34495e";
        }

        socket.on('gameOver', d => { alert("승자: " + d.winner); location.reload(); });
        socket.on('rematchStarted', () => { location.reload(); });
        socket.on('systemMsg', m => addGameLog("[시스템] " + m));
        socket.on('receiveChat', d => {
            const l = document.getElementById('chat-log');
            l.innerHTML += `<div><strong>${d.name}:</strong> ${d.msg}</div>`;
            l.scrollTop = l.scrollHeight;
        });

        function changeRole(r) { socket.emit('changeRole', r); }
        function sendChat() { const i = document.getElementById('chat-input'); if(i.value) socket.emit('sendChat', i.value); i.value = ""; }
        function addGameLog(m) { const l = document.getElementById('game-log'); l.innerHTML += `<div>${m}</div>`; l.scrollTop = l.scrollHeight; }
        function resetPlacement() {
            if(gameStatus !== 'PLACING' && gameStatus !== 'MOVING') return;
            myUnits.forEach(u => { if(!u.isHit) inventory[u.type]++; });
            myUnits = myUnits.filter(u => u.isHit); renderInventory(); renderMyGrid();
            addGameLog("[알림] 배치가 초기화되었습니다.");
        }
    </script>
</body>
</html>
