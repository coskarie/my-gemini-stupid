<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>블록 찾기: 전술 기동 온라인</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; background: #f0f0f0; overflow: hidden; }
        #login-screen { position: fixed; inset: 0; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        #main-game { display: none; flex: 1; padding: 10px; gap: 15px; overflow-y: auto; }
        
        .left-panel { flex: 2; display: flex; flex-direction: column; gap: 5px; }
        .right-panel { flex: 1; display: flex; flex-direction: column; gap: 10px; min-width: 250px; }
        
        .name-label { font-size: 1.1em; font-weight: bold; display: flex; align-items: center; gap: 8px; margin: 2px 0; }
        .v-mark { color: #4CAF50; font-weight: 900; display: none; }

        .grid { 
            width: 100%; height: 210px; background: #34495e; border: 2px solid #333; 
            display: grid; grid-template-columns: repeat(20, 1fr); grid-template-rows: repeat(10, 1fr); 
        }
        .grid div { border: 0.1px solid #555; cursor: pointer; box-sizing: border-box; }
        
        .my-unit { background: #2ecc71 !important; border: 1px solid #27ae60 !important; }
        .hit-unit { background: #e74c3c !important; border: 1px solid #c0392b !important; }
        .miss-cell { background: #95a5a6 !important; }
        
        /* 🚨 문제의 pointer-events: none; 삭제 완료 🚨 */
        .ghost { background: rgba(46, 204, 113, 0.4); } 
        .ghost-invalid { background: rgba(231, 76, 60, 0.4); }

        .inventory { display: flex; gap: 5px; flex-wrap: wrap; background: #ddd; padding: 8px; border-radius: 5px; margin-bottom: 5px; min-height: 45px; }
        .unit-btn { padding: 6px 10px; border: 1px solid #333; cursor: pointer; background: white; font-weight: bold; font-size: 0.85em; }
        .unit-btn.active { background: #3498db; color: white; border-color: #2980b9; }
        
        .ctrl-group { display: flex; gap: 8px; justify-content: center; margin-bottom: 5px; }
        button { cursor: pointer; border-radius: 4px; border: 1px solid #999; font-weight: bold; }
        #start-btn { background: #4CAF50; color: white; border: none; font-size: 1.1em; padding: 10px 20px; transition: 0.3s; }
        #start-btn:disabled { background: #ccc; cursor: not-allowed; }
        .sub-btn { background: #f39c12; color: white; border: none; padding: 8px 15px; }
        
        .log-area, .chat-area { flex: 1; background: white; border: 1px solid #ccc; overflow-y: auto; padding: 10px; font-size: 0.85em; border-radius: 5px; }
        .chat-input-group { display: flex; gap: 5px; }
        .user-list-box { background: #eee; padding: 10px; border-radius: 5px; font-size: 0.9em; display: flex; flex-direction: column; gap: 5px; }
        .my-turn-border { border: 4px solid #ff9800 !important; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1>전술 기동 블록 찾기</h1>
        <div style="margin-bottom: 10px; display: flex; flex-direction: column; gap: 5px;">
            <input type="text" id="name-input" placeholder="이름 입력" style="padding: 10px; width: 200px;" value="테스터">
            <input type="number" id="room-input" placeholder="방 번호" style="padding: 10px; width: 200px;" value="1">
        </div>
        <button onclick="joinGame()" style="padding: 12px 30px; background:#2ecc71; color:white; border:none; font-size: 1.1em;">입장하기</button>
    </div>

    <div id="main-game">
        <div class="left-panel">
            <div class="name-label">상대: <span id="opp-name">대기 중</span> <span id="opp-v" class="v-mark">[V]</span></div>
            <div id="opponent-grid" class="grid"></div>
            
            <div id="unit-inventory" class="inventory"></div>
            
            <div class="ctrl-group">
                <button id="start-btn" onclick="handleButtonClick()">준비하기</button>
                <button class="sub-btn" style="background:#e67e22;" onclick="resetPlacement()">초기화 🧹</button>
            </div>
            
            <div class="name-label">나: <span id="my-name-display">-</span> <span id="my-v" class="v-mark">[V]</span></div>
            <div id="my-grid" class="grid" onmouseleave="clearGhost()"></div>
        </div>

        <div class="right-panel">
            <strong>📊 게임 로그</strong>
            <div id="game-log" class="log-area"></div>
            
            <strong>💬 실시간 채팅</strong>
            <div id="chat-log" class="chat-area"></div>
            <div class="chat-input-group">
                <input type="text" id="chat-input" style="flex:1; padding: 5px;" onkeypress="if(event.keyCode==13) sendChat()">
                <button onclick="sendChat()" style="padding: 5px 15px;">전송</button>
            </div>

            <div class="user-list-box">
                <strong>👥 접속자 명단</strong>
                <div id="player-list">플레이어: </div>
                <div id="spectator-list">관전자: </div>
                <div style="display: flex; gap: 5px; margin-top: 5px;">
                    <button onclick="changeRole('player')" style="flex:1; font-size: 0.8em; padding: 5px;">플레이어로 가기</button>
                    <button onclick="changeRole('spectator')" style="flex:1; font-size: 0.8em; padding: 5px;">관전자로 가기</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = (typeof io !== 'undefined') ? io() : { emit: ()=>{}, on: ()=>{} };
        let myName = "", myRoom = "", myUnits = [], isMyTurn = false;
        
        // 🔒 파트너님 조건: 시작 상태는 무조건 로비, 선택 유닛 없음, 플레이어 아님으로 시작
        let gameStatus = "LOBBY"; 
        let selectedUnitType = null; 
        let isPlayer = false; // 내가 플레이어인지 관전자인지 판별

        const UNIT_SHAPES = {
            'ㄷ': [[0,0], [1,0], [0,1], [0,2], [1,2]],
            'L':  [[0,0],[0,1],[0,2],[1,2]],
            'T':  [[0,0],[1,0],[2,0],[1,1]],
            'ㅗ': [[0,1],[1,0],[1,1],[2,1]],
            'I':  [[0,0],[1,0],[2,0],[3,0]],
            '1x1': [[0,0]],
            '1x2': [[0,0],[1,0]]
        };

        let inventory = { 'ㄷ':1, 'L':1, 'T':1, 'ㅗ':1, 'I':1, '1x1':1, '1x2':1 };

        function joinGame() {
            myName = document.getElementById('name-input').value;
            myRoom = document.getElementById('room-input').value;
            if(!myName || !myRoom) return alert("입력 정보 부족!");
            document.getElementById('my-name-display').innerText = myName;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-game').style.display = 'flex';
            socket.emit('joinRoom', { roomCode: myRoom, name: myName });
            renderInventory();
            initGrids();
        }

        function initGrids() {
            const oppGrid = document.getElementById('opponent-grid');
            const myGrid = document.getElementById('my-grid');
            oppGrid.innerHTML = ''; myGrid.innerHTML = '';
            for(let i=0; i<200; i++) {
                const oCell = document.createElement('div');
                oCell.onclick = function() { 
                    if(gameStatus === 'PLAYING' && isMyTurn) socket.emit('attack', i); 
                    else if(gameStatus === 'PLAYING' && !isMyTurn) addGameLog("[차단] 지금은 내 턴이 아닙니다.");
                };
                oppGrid.appendChild(oCell);
                
                const mCell = document.createElement('div');
                mCell.onmouseenter = function() { showGhost(i); };
                mCell.onclick = function() { placeOrPickUnit(i); };
                myGrid.appendChild(mCell);
            }
        }

        function getPlacementCells(type, pivotIdx) {
            const shape = UNIT_SHAPES[type];
            if(!shape) return [];

            const pcol = pivotIdx % 20;       
            const prow = Math.floor(pivotIdx / 20); 

            const minC = Math.min(...shape.map(o => o[0]));
            const minR = Math.min(...shape.map(o => o[1]));

            return shape.map(([c, r]) => {
                const fc = pcol + (c - minC);
                const fr = prow + (r - minR);
                if(fc < 0 || fc >= 20 || fr < 0 || fr >= 10) return -1;
                return fr * 20 + fc;
            });
        }

        function placeOrPickUnit(idx) {
            // 🔒 [조건 1, 2 완벽 적용] 파이썬 스타일 입구컷 방어선
            if (!isPlayer) {
                addGameLog("[차단] 관전자는 유닛을 배치할 수 없습니다.");
                return;
            }
            // 🚨 수정: PLACING(배치)이거나 MOVING(기동)일 때는 통과!
            if (gameStatus !== 'PLACING' && gameStatus !== 'MOVING') {
                addGameLog("[차단] 지금은 유닛을 움직일 수 있는 단계가 아닙니다.");
                return;
            }

            // --- 통과 시 로직 ---
            const unitIdx = myUnits.findIndex(u => u.cells.includes(idx));
            if (unitIdx !== -1) {
                const unit = myUnits[unitIdx];
                if (unit.isHit) return alert("이미 피격된 유닛은 이동할 수 없습니다!");
                myUnits.splice(unitIdx, 1);
                selectedUnitType = unit.type;
                inventory[unit.type]++;
                renderInventory(); renderMyGrid();
                addGameLog("[알림] 유닛 회수: " + unit.type);
                return;
            }

            if(!selectedUnitType) {
                addGameLog("[알림] 먼저 유닛 모양을 선택하세요!");
                return;
            }

            const cells = getPlacementCells(selectedUnitType, idx);

            if(cells.includes(-1)) return;
            if(cells.some(c => myUnits.some(u => u.cells.includes(c)))) return;

            myUnits.push({ type: selectedUnitType, cells: cells, isHit: false });
            inventory[selectedUnitType]--;

            if(inventory[selectedUnitType] <= 0) {
                selectedUnitType = Object.keys(inventory).find(t => inventory[t] > 0) || null;
            }

            renderInventory(); renderMyGrid();

            const remaining = Object.entries(inventory).filter(([,v]) => v > 0);
            if(remaining.length === 0) {
                addGameLog("[성공] 모든 유닛 배치 완료! 확정 버튼을 누르세요.");
            }
        }

        function renderMyGrid() {
            const cells = document.getElementById('my-grid').children;
            for(let i=0; i<200; i++) {
                cells[i].className = '';
                cells[i].style.opacity = "1";
            }
            myUnits.forEach(u => {
                u.cells.forEach(c => {
                    if(c < 0 || c >= 200) return;
                    cells[c].classList.add('my-unit');
                    if(u.isHit) cells[c].style.opacity = "0.6";
                    if(u.hitCells && u.hitCells.includes(c)) cells[c].classList.add('hit-unit');
                });
            });
        }

        function showGhost(idx) {
            clearGhost();
            
            // 🚨 수정: MOVING 단계에서도 미리보기가 작동하도록 조건 추가
            if (!isPlayer || (gameStatus !== 'PLACING' && gameStatus !== 'MOVING') || !selectedUnitType) return;
            
            const cells = getPlacementCells(selectedUnitType, idx);
            const myG = document.getElementById('my-grid');
            const invalid = cells.includes(-1) || cells.some(c => myUnits.some(u => u.cells.includes(c)));
            
            cells.forEach(c => { 
                if(c >= 0 && c < 200) {
                    myG.children[c].classList.add('ghost');
                    if(invalid) myG.children[c].classList.add('ghost-invalid');
                }
            });
        }

        function clearGhost() { 
            document.querySelectorAll('.ghost').forEach(g => g.classList.remove('ghost', 'ghost-invalid')); 
        }

        function renderInventory() {
            const inv = document.getElementById('unit-inventory');
            inv.innerHTML = '';
            for(let type in inventory) {
                if(inventory[type] > 0) {
                    const btn = document.createElement('button');
                    btn.className = 'unit-btn' + (selectedUnitType === type ? ' active' : '');
                    btn.innerText = `${type}(${inventory[type]})`;
                    btn.onclick = function() { selectedUnitType = type; renderInventory(); };
                    inv.appendChild(btn);
                }
            }
        }

        function resetPlacement() {
            // 🚨 수정: MOVING 상태일 때도 초기화 허용
            if(gameStatus !== 'PLACING' && gameStatus !== 'MOVING') return; 
            
            myUnits.forEach(u => { if(!u.isHit) inventory[u.type]++; });
            myUnits = myUnits.filter(u => u.isHit);
            selectedUnitType = Object.keys(inventory).find(t => inventory[t] > 0) || null;
            renderInventory(); renderMyGrid();
            addGameLog("[알림] 배치 초기화 완료");
        }

        function handleButtonClick() {
            const btn = document.getElementById('start-btn');
            const txt = btn.innerText.trim();

            if (txt === "게임 시작하기!") {
                socket.emit('startGame');
            } else if (txt === "준비하기" || txt === "준비 취소") {
                socket.emit('toggleReady');
            } else if (txt === "배치 확정" || txt === "기동 확정") {
                if (Object.values(inventory).some(v => v > 0)) {
                    return alert("모든 유닛을 배치해야 합니다!\n남은 유닛: " +
                        Object.entries(inventory).filter(([,v])=>v>0).map(([k,v])=>`${k}(${v}개)`).join(', '));
                }
                btn.disabled = true; btn.innerText = "상대 대기 중...";
                socket.emit('finishPlacing', myUnits);
            } else if (txt === "재대결 신청") {
                socket.emit('requestRematch');
            }
        }

        socket.on('roomData', data => {
            const me = data.players.find(p => p.id === socket.id);
            const opp = data.players.find(p => p.id !== socket.id);
            const btn = document.getElementById('start-btn');

            // 🔒 내가 플레이어인지 관전자인지 판별하여 변수에 저장
            isPlayer = !!me; 
            gameStatus = data.gameState;

            document.getElementById('my-v').style.display = (me && me.isReady) ? 'inline' : 'none';
            if (opp) {
                document.getElementById('opp-name').innerText = opp.name;
                document.getElementById('opp-v').style.display = opp.isReady ? 'inline' : 'none';
            } else {
                document.getElementById('opp-name').innerText = "대기 중";
                document.getElementById('opp-v').style.display = 'none';
            }

            if (data.gameState === 'LOBBY') {
                btn.disabled = false;
                if (data.players.length === 2 && data.players.every(p => p.isReady)) {
                    btn.innerText = "게임 시작하기!"; btn.style.background = "#FF9800";
                } else {
                    btn.innerText = (me && me.isReady) ? "준비 취소" : "준비하기"; btn.style.background = "#4CAF50";
                }
            }
            document.getElementById('player-list').innerText = "플레이어: " + data.players.map(p => p.name).join(', ');
            document.getElementById('spectator-list').innerText = "관전자: " + data.spectators.map(s => s.name).join(', ');
        });

        function changeRole(r) { socket.emit('changeRole', r); }

        socket.on('startPlacing', () => {
            gameStatus = "PLACING";
            if (myUnits.length === 0) {
                inventory = { 'ㄷ':1, 'L':1, 'T':1, 'ㅗ':1, 'I':1, '1x1':1, '1x2':1 };
                selectedUnitType = Object.keys(inventory)[0];
            }
            renderInventory(); renderMyGrid();
            const btn = document.getElementById('start-btn');
            btn.innerText = "배치 확정"; btn.style.background = "#2ecc71"; btn.disabled = false;
        });

        socket.on('startMoving', () => {
            gameStatus = "MOVING";
            const btn = document.getElementById('start-btn');
            btn.innerText = "기동 확정"; btn.style.background = "#9b59b6"; btn.disabled = false;
            addGameLog("[시스템] 전술 기동 단계입니다.");
        });

        socket.on('gameStart', data => {
            gameStatus = "PLAYING";
            updateTurn(data.turn);
            addGameLog("[시스템] 전투 시작! 상대 격자를 공격하세요.");
        });

        socket.on('attackResult', data => {
            const grid = (data.attacker === socket.id) ? document.getElementById('opponent-grid') : document.getElementById('my-grid');
            grid.children[data.index].classList.add(data.hit ? 'hit-unit' : 'miss-cell');
            if(!data.hit) updateTurn(data.nextTurn);
            
            // 🚨 [추가된 핵심 로직] 상대가 내 격자를 맞췄을 때, 내 브라우저도 데미지를 기억하게 함!
            if (data.attacker !== socket.id && data.hit) {
                myUnits.forEach(u => {
                    if (u.cells.includes(data.index)) {
                        if (!u.hitCells) u.hitCells = [];
                        if (!u.hitCells.includes(data.index)) {
                            u.hitCells.push(data.index);
                        }
                        u.isHit = true; // 한 대라도 맞으면 '이동 불가' 상태로 완전 잠금
                    }
                });
                renderMyGrid(); // 맞은 유닛을 반투명하게 만드는 시각 효과 발동
            }

            addGameLog(`${data.attacker === socket.id ? '내' : '상대'} 공격: ${data.index}번 → ${data.hit ? "💥 적중!" : "🌊 불발"}`);
        });

        function updateTurn(turnId) {
            isMyTurn = (socket.id === turnId);
            const btn = document.getElementById('start-btn');
            btn.innerText = isMyTurn ? "🔥 나의 턴" : "⏳ 상대 턴";
            btn.style.background = isMyTurn ? "#e74c3c" : "#34495e";
            document.getElementById('opponent-grid').className = isMyTurn ? "grid my-turn-border" : "grid";
        }

        socket.on('gameOver', data => {
            gameStatus = "ENDED";
            const btn = document.getElementById('start-btn');
            btn.disabled = false; btn.innerText = "재대결 신청"; btn.style.background = "#8e44ad";
            addGameLog("[시스템] 게임 종료! 승자: " + data.winner);
            alert("게임 종료! 승자: " + data.winner);
        });

        socket.on('rematchStarted', () => { location.reload(); });
        socket.on('systemMsg', msg => addGameLog("[시스템] " + msg));
        
        function sendChat() {
            const i = document.getElementById('chat-input');
            if(i.value) socket.emit('sendChat', i.value);
            i.value = "";
        }
        socket.on('receiveChat', d => {
            const l = document.getElementById('chat-log');
            l.innerHTML += `<div><strong>${d.name}:</strong> ${d.msg}</div>`;
            l.scrollTop = l.scrollHeight;
        });

        function addGameLog(m) {
            const l = document.getElementById('game-log');
            l.innerHTML += `<div>${m}</div>`;
            l.scrollTop = l.scrollHeight;
        }
    </script>
</body>
</html>
