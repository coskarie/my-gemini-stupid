<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>배치 버그 끝장내기</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #ddd; display: flex; flex-direction: column; height: 100vh; }
        .game-container { display: flex; flex: 1; padding: 10px; gap: 10px; }
        .grid { width: 400px; height: 200px; background: #333; display: grid; grid-template-columns: repeat(20, 1fr); grid-template-rows: repeat(10, 1fr); border: 2px solid #000; }
        .grid div { border: 1px solid #444; cursor: pointer; }
        .my-unit { background: #2ecc71 !important; } /* 배치된 블록 */
        .ghost { background: rgba(46, 204, 113, 0.4) !important; } /* 미리보기 */
        .inventory { background: #fff; padding: 10px; display: flex; gap: 5px; margin-bottom: 10px; border-radius: 5px; }
        .unit-btn { padding: 10px; cursor: pointer; font-weight: bold; border: 1px solid #000; }
        .unit-btn.active { background: #3498db; color: #fff; }
        .log-area { flex: 1; background: #000; color: #0f0; padding: 10px; overflow-y: auto; font-family: monospace; font-size: 12px; }
        .ctrl-group { margin-top: 10px; }
    </style>
</head>
<body>

    <div class="inventory" id="inv-ui"></div>

    <div class="game-container">
        <div style="display:flex; flex-direction:column;">
            <div id="my-grid" class="grid" onmouseleave="clearGhost()"></div>
            <div class="ctrl-group">
                <button onclick="rotateUnit()" style="padding:10px 20px; cursor:pointer;">회전 🔄</button>
                <button onclick="resetPlacement()" style="padding:10px 20px; cursor:pointer;">초기화 🧹</button>
            </div>
        </div>
        <div class="log-area" id="game-log">
            <div>[System] 배치를 테스트하세요.</div>
        </div>
    </div>

    <script>
        // 1. 데이터 정의 (파트너님의 3x3 이론)
        const UNIT_DATA = {
            'ㄷ': [[1,1,0], [1,0,0], [1,1,0]],
            'L': [[1,0,0], [1,0,0], [1,1,0]],
            'T': [[1,1,1], [0,1,0], [0,0,0]],
            'ㅗ': [[0,1,0], [1,1,1], [0,0,0]],
            '1x1': [[1]],
            '1x2': [[1,1]]
        };
        let inventory = { 'ㄷ':1, 'L':1, 'T':1, 'ㅗ':1, '1x1':1, '1x2':1 };
        let myUnits = [];
        let selectedType = null;
        let currentRotation = 0;

        // 2. 초기화
        window.onload = () => {
            const grid = document.getElementById('my-grid');
            for(let i=0; i<200; i++) {
                const cell = document.createElement('div');
                cell.onmouseenter = () => showGhost(i);
                cell.onclick = () => handleCellClick(i);
                grid.appendChild(cell);
            }
            renderInventory();
            console.log("페이지 로드 완료");
        };

        function addGameLog(msg) {
            const logBox = document.getElementById('game-log');
            const div = document.createElement('div');
            div.innerText = `> ${msg}`;
            logBox.appendChild(div);
            logBox.scrollTop = logBox.scrollHeight;
            console.log("Log:", msg); // 브라우저 콘솔에도 동시 출력
        }

        function renderInventory() {
            const ui = document.getElementById('inv-ui');
            ui.innerHTML = '';
            for(let t in inventory) {
                if(inventory[t] > 0) {
                    const btn = document.createElement('button');
                    btn.className = 'unit-btn' + (selectedType === t ? ' active' : '');
                    btn.innerText = `${t} (${inventory[t]})`;
                    btn.onclick = () => {
                        selectedType = t;
                        renderInventory();
                        addGameLog(`${t} 선택됨`);
                    };
                    ui.appendChild(btn);
                }
            }
        }

        // 3. 3x3 회전 및 배치 계산 (핵심 로직)
        function getCells(type, idx, rotation) {
            let matrix = UNIT_DATA[type];
            if(!matrix) return [];

            // 회전
            let rotated = JSON.parse(JSON.stringify(matrix));
            const rotCount = (rotation / 90) % 4;
            for(let i=0; i<rotCount; i++) {
                const r = rotated.length, c = rotated[0].length;
                let newMat = Array.from({ length: c }, () => Array(r).fill(0));
                for(let y=0; y<r; y++) {
                    for(let x=0; x<c; x++) {
                        newMat[x][r-1-y] = rotated[y][x];
                    }
                }
                rotated = newMat;
            }

            // 투영 (클릭한 칸을 상자의 정중앙으로 잡기)
            const rows = rotated.length;
            const cols = rotated[0].length;
            const midR = Math.floor(rows / 2);
            const midC = Math.floor(cols / 2);
            const px = idx % 20;
            const py = Math.floor(idx / 20);

            let results = [];
            for(let y=0; y<rows; y++) {
                for(let x=0; x<cols; x++) {
                    if(rotated[y][x] === 1) { // 1인 부분만 땅을 차지
                        let fx = px + (x - midC);
                        let fy = py + (y - midR);
                        if(fx < 0 || fx >= 20 || fy < 0 || fy >= 10) results.push(-1);
                        else results.push(fy * 20 + fx);
                    }
                }
            }
            return results;
        }

        function handleCellClick(idx) {
            addGameLog(`칸 클릭: ${idx}`);
            
            // 유닛 회수 (이미 있으면 빼기)
            const uIdx = myUnits.findIndex(u => u.cells.includes(idx));
            if(uIdx !== -1) {
                const u = myUnits.splice(uIdx, 1)[0];
                inventory[u.type]++;
                selectedType = u.type;
                renderInventory();
                renderGrid();
                addGameLog(`${u.type} 회수됨`);
                return;
            }

            if(!selectedType) return addGameLog("유닛을 먼저 선택하세요!");

            const cells = getCells(selectedType, idx, currentRotation);
            addGameLog(`계산 좌표: ${JSON.stringify(cells)}`);

            if(cells.includes(-1)) return addGameLog("실패: 격자 밖입니다.");
            if(cells.some(c => myUnits.some(u => u.cells.includes(c)))) return addGameLog("실패: 겹칩니다.");

            // 배치 성공
            myUnits.push({ type: selectedType, cells: cells });
            inventory[selectedType]--;
            if(inventory[selectedType] <= 0) selectedType = null;
            
            renderInventory();
            renderGrid();
            addGameLog("배치 성공!");
        }

        function renderGrid() {
            const divs = document.getElementById('my-grid').children;
            for(let i=0; i<200; i++) divs[i].className = '';
            myUnits.forEach(u => {
                u.cells.forEach(c => divs[c].classList.add('my-unit'));
            });
        }

        function showGhost(idx) {
            clearGhost();
            if(!selectedType) return;
            const cells = getCells(selectedType, idx, currentRotation);
            const divs = document.getElementById('my-grid').children;
            cells.forEach(c => {
                if(c !== -1) divs[c].classList.add('ghost');
            });
        }

        function clearGhost() {
            document.querySelectorAll('.ghost').forEach(g => g.classList.remove('ghost'));
        }

        function rotateUnit() {
            currentRotation = (currentRotation + 90) % 360;
            addGameLog(`회전: ${currentRotation}도`);
        }

        function resetPlacement() {
            myUnits = [];
            inventory = { 'ㄷ':1, 'L':1, 'T':1, 'ㅗ':1, '1x1':1, '1x2':1 };
            selectedType = null;
            renderInventory();
            renderGrid();
            addGameLog("초기화 완료");
        }
    </script>
</body>
</html>
